events {
    worker_connections 1024;
}

http {
    # Set up the upstream server pool (Round-Robin with failover parameters)
    upstream blood_donation_cluster {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8081 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=10s;
    }

    server {
        # Listen on port 80 (Standard HTTP port)
        listen 80;
        server_name localhost;

        location / {
            # Proxy incoming requests to the Spring Boot cluster
            proxy_pass http://blood_donation_cluster;
            
            # Forward appropriate headers for security and request metadata
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable quick failover (if an instance goes down, route immediately to next)
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }
    }
}
