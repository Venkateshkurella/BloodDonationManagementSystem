<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blood Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=2)}">
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>

<div class="card-wrapper">
    <div class="card" style="max-width: 500px;">
        <h1 class="form-title">🩸 Add Blood Details</h1>
        <p class="form-description">Add new blood group inventory level for your center.</p>

        <form action="/admin/save" method="post">
            <!-- Read-only Center Identity Information -->
            <div class="form-group">
                <label>Blood Center Name (Logged In)</label>
                <input type="text"
                       th:value="${centerName}"
                       style="background: rgba(255, 255, 255, 0.03); color: var(--text-secondary); cursor: not-allowed;"
                       disabled>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text"
                       th:value="${centerLocation}"
                       style="background: rgba(255, 255, 255, 0.03); color: var(--text-secondary); cursor: not-allowed;"
                       disabled>
            </div>

            <div class="form-group">
                <label for="groupInput">Blood Group Available</label>
                <select id="groupInput" name="bloodGroup" required>
                    <option value="" disabled selected>Select blood group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantityInput">Quantity Available (Units)</label>
                <input type="number"
                       id="quantityInput"
                       name="quantity"
                       placeholder="e.g. 20"
                       min="0"
                       required>
            </div>

            <button type="submit" class="btn">Save Blood Details</button>
        </form>

        <div class="back-btn-container">
            <a href="/admin/dashboard" class="back-link">⬅ Back to Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
