<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Center Records</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=2)}">
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>

<div class="container" style="max-width: 1000px;">
    <div class="hero-section" style="margin-bottom: 30px;">
        <div class="hero-badge">📋 Center Stock Directory</div>
        <h1 th:text="${centerName} + ' Stock'">Blood Center Records</h1>
        <p>Monitor and manage blood availability levels for your center.</p>
    </div>

    <!-- Search and Actions Bar -->
    <div class="search-bar-container">
        <input type="text" 
               id="searchInput" 
               class="search-input" 
               placeholder="🔍 Search stock by blood group or quantity..."
               onkeyup="filterTable()">
        <a href="/admin/form" class="btn btn-sm">➕ Add Blood Details</a>
    </div>

    <!-- Table Container -->
    <div class="table-container">
        <table class="custom-table" id="adminTable">
            <thead>
                <tr>
                    <th>Stock ID</th>
                    <th>Blood Group</th>
                    <th>Quantity Available (Units)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="stock : ${stocks}" th:id="'row-' + ${stock.id}">
                    <td class="stock-id" th:text="${stock.id}"></td>
                    <td>
                        <span class="blood-badge stock-bloodgroup" th:text="${stock.bloodGroup}"></span>
                    </td>
                    <td class="stock-quantity" th:text="${stock.quantity}"></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-sm btn-secondary" 
                                    th:onclick="'openEditModal(' + ${stock.id} + ')'">
                                ✏️ Edit
                            </button>
                            <button class="btn btn-sm btn-danger" 
                                    th:onclick="'deleteAdmin(' + ${stock.id} + ')'">
                                🗑️ Delete
                            </button>
                        </div>
                    </td>
                </tr>
                <tr id="noResultsRow" style="display: none;">
                    <td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 30px;">
                        No matching records found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="back-btn-container">
        <a href="/admin/dashboard" class="back-link">⬅ Back to Dashboard</a>
    </div>
</div>

<!-- Edit Modal Overlay -->
<div class="modal" id="editModal">
    <div class="modal-content" style="max-width: 400px;">
        <button class="close-modal-btn" onclick="closeEditModal()">&times;</button>
        <h2 class="form-title" style="font-size: 1.6rem; text-align: left; margin-bottom: 20px;">✏️ Edit Blood Stock</h2>
        
        <form id="editForm" onsubmit="submitEditForm(event)">
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label for="editBloodGroup">Blood Group</label>
                <select id="editBloodGroup" required>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="editQuantity">Quantity Available (Units)</label>
                <input type="number" id="editQuantity" min="0" required>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="btn">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- Floating Toast Notifications -->
<div class="toast" id="toast">
    <span id="toastIcon">✅</span>
    <span id="toastMessage">Action completed successfully!</span>
</div>

<script>
    // Toast Notification Utility
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toastIcon');
        const msg = document.getElementById('toastMessage');
        
        msg.textContent = message;
        icon.textContent = isError ? '❌' : '✅';
        
        if (isError) {
            toast.classList.add('toast-error');
        } else {
            toast.classList.remove('toast-error');
        }
        
        toast.classList.add('active');
        
        setTimeout(() => {
            toast.classList.remove('active');
        }, 3000);
    }

    // Client-side table search filtering
    function filterTable() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toLowerCase();
        const table = document.getElementById('adminTable');
        const tr = table.getElementsByTagName('tr');
        let visibleCount = 0;
        
        for (let i = 1; i < tr.length; i++) {
            // Skip the noResultsRow itself
            if (tr[i].id === 'noResultsRow') continue;
            
            const tds = tr[i].getElementsByTagName('td');
            let match = false;
            
            for (let j = 0; j < tds.length - 1; j++) {
                if (tds[j]) {
                    const textValue = tds[j].textContent || tds[j].innerText;
                    if (textValue.toLowerCase().indexOf(filter) > -1) {
                        match = true;
                        break;
                    }
                }
            }
            
            if (match) {
                tr[i].style.display = '';
                visibleCount++;
            } else {
                tr[i].style.display = 'none';
            }
        }
        
        const noResultsRow = document.getElementById('noResultsRow');
        if (visibleCount === 0) {
            noResultsRow.style.display = '';
        } else {
            noResultsRow.style.display = 'none';
        }
    }

    // Modal Operations
    function openEditModal(id) {
        const row = document.getElementById('row-' + id);
        if (!row) return;
        
        const bloodgroup = row.querySelector('.stock-bloodgroup').textContent;
        const quantity = row.querySelector('.stock-quantity').textContent;
        
        document.getElementById('editId').value = id;
        document.getElementById('editBloodGroup').value = bloodgroup;
        document.getElementById('editQuantity').value = quantity;
        
        const modal = document.getElementById('editModal');
        modal.classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
    }

    // AJAX Form Submit (PUT Request)
    function submitEditForm(event) {
        event.preventDefault();
        
        const id = document.getElementById('editId').value;
        const bloodgroup = document.getElementById('editBloodGroup').value;
        const quantity = document.getElementById('editQuantity').value;
        
        const params = new URLSearchParams();
        params.append('bloodGroup', bloodgroup);
        params.append('quantity', quantity);
        
        fetch(`/admin/update/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params
        })
        .then(response => {
            if (response.ok) {
                return response.text();
            }
            throw new Error('Failed to update details.');
        })
        .then(data => {
            // Update table values dynamically
            const row = document.getElementById('row-' + id);
            row.querySelector('.stock-bloodgroup').textContent = bloodgroup;
            row.querySelector('.stock-quantity').textContent = quantity;
            
            closeEditModal();
            showToast('Stock record updated successfully!');
        })
        .catch(error => {
            showToast(error.message, true);
        });
    }

    // AJAX Delete Request
    function deleteAdmin(id) {
        if (!confirm('Are you sure you want to delete this blood stock entry? This action cannot be undone.')) {
            return;
        }
        
        fetch(`/admin/delete/${id}`, {
            method: 'DELETE'
        })
        .then(response => {
            if (response.ok) {
                return response.text();
            }
            throw new Error('Failed to delete record.');
        })
        .then(data => {
            const row = document.getElementById('row-' + id);
            if (row) {
                row.style.transition = 'all 0.5s ease';
                row.style.opacity = '0';
                row.style.transform = 'translateX(20px)';
                setTimeout(() => {
                    row.remove();
                    filterTable();
                }, 500);
            }
            showToast('Stock record deleted successfully.');
        })
        .catch(error => {
            showToast(error.message, true);
        });
    }
</script>

</body>
</html>
